<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
	<title>Image Resizer Pro</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	<script src="https://cdn.tailwindcss.com"></script>
	<script>
		tailwind.config = {
			darkMode: 'class',
			theme: {
				extend: {
					fontFamily: {
						sans: ['Inter', 'ui-sans-serif', 'system-ui']
					}
				}
			}
		}
	</script>
	<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
	<!-- JSZip & FileSaver for Download All (ZIP) -->
	<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
	
	<script src="https://cdnjs.cloudflare.com/ajax/libs/pulltorefreshjs/0.1.22/index.umd.min.js"></script>

	<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🖼️</text></svg>">
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 select-none md:select-auto overscroll-none font-sans" id="appBody">
	<header class="bg-white/90 backdrop-blur-md dark:bg-slate-900/90 shadow-sm sticky top-0 z-50 pt-[env(safe-area-inset-top)]">
		<div class="w-full px-5 py-4 flex items-center justify-between">
			<h1 class="text-[22px] font-bold tracking-tight text-slate-800 dark:text-slate-100">Image Resizer Pro</h1>
			<div class="flex items-center gap-3">
				<button id="themeToggle" class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 active:scale-90 transition-transform" aria-label="Toggle dark mode" title="Toggle theme">
					<!-- Moon icon (shown in light mode) -->
					<svg class="w-5 h-5 dark:hidden" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
						<path d="M21.752 15.002A9.718 9.718 0 0 1 12.003 22C6.478 22 2 17.523 2 12A9.718 9.718 0 0 1 8.998 2.248a.75.75 0 0 1 .92.92A8.218 8.218 0 0 0 10.25 5c0 4.556 3.694 8.25 8.25 8.25c.69 0 1.365-.084 2.006-.242a.75.75 0 0 1 1.246.994z"/>
					</svg>
					<!-- Sun icon (shown in dark mode) -->
					<svg class="w-5 h-5 hidden dark:inline" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
						<path d="M12 4a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0V5a1 1 0 0 1 1-1zm0 13a5 5 0 1 0 0-10a5 5 0 0 0 0 10zm7-6a1 1 0 0 1 1 1h1a1 1 0 1 1 0 2h-1a1 1 0 1 1-2 0a1 1 0 0 1 1-1zm-7 7a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0v-1a1 1 0 0 1 1-1zM4 12a1 1 0 0 1 1-1H6a1 1 0 1 1 0 2H5a1 1 0 0 1-1-1zm12.95-6.364a1 1 0 0 1 1.414 0l.707.707a1 1 0 0 1-1.414 1.414l-.707-.707a1 1 0 0 1 0-1.414zM5.636 17.95a1 1 0 0 1 1.414 0l.707.707A1 1 0 0 1 6.343 20.07l-.707-.707a1 1 0 0 1 0-1.414zM5.636 5.636a1 1 0 0 1 1.414-1.414l.707.707A1 1 0 0 1 6.343 6.343l-.707-.707a1 1 0 0 1 0-1.414zm12.02 12.02a1 1 0 0 1 1.414 0l.707.707a1 1 0 0 1-1.414 1.414l-.707-.707a1 1 0 0 1 0-1.414z"/>
					</svg>
				</button>
			</div>
		</div>
	</header>

	<main class="w-full px-5 py-6 pb-[env(safe-area-inset-bottom)]" id="mainContent">
		<section class="flex flex-col gap-6">
			<div class="md:col-span-1 space-y-6">
				
				<!-- Material Card 1: Select & Preview -->
				<div class="bg-white rounded-[24px] p-5 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)] dark:bg-slate-800/80 border border-slate-100 dark:border-slate-700/50">
					<h2 class="text-lg font-bold mb-4 flex items-center gap-2"><span class="flex items-center justify-center w-6 h-6 rounded-full bg-indigo-100 text-indigo-700 text-xs dark:bg-indigo-900/50 dark:text-indigo-300">1</span> Selected Images</h2>
					
					<!-- Dropzone -->
					<input id="fileInput" type="file" accept="image/*" multiple class="hidden">
					<div id="dropZone" class="flex flex-col items-center justify-center border-2 border-dashed border-indigo-200 dark:border-indigo-900/50 rounded-[20px] p-8 text-center cursor-pointer bg-indigo-50/50 hover:bg-indigo-50 active:bg-indigo-100 transition duration-200 active:scale-[0.98] dark:bg-slate-800/50 dark:hover:bg-slate-800 mb-6 group">
						<svg class="mx-auto h-14 w-14 text-indigo-400 dark:text-indigo-500 mb-4 group-active:scale-95 transition-transform" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
							<path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
						</svg>
						<button type="button" class="inline-flex items-center justify-center px-6 py-2.5 mb-3 rounded-full bg-indigo-600 text-white font-bold text-sm shadow-md shadow-indigo-200 active:bg-indigo-700 transition dark:shadow-none pointer-events-none">
							Open Gallery
						</button>
						<p class="text-sm text-slate-500 dark:text-slate-400">JPG, PNG, WEBP</p>
					</div>

					<!-- Preview Container -->
					<div id="previewContainer" class="hidden">
						<div class="flex items-center justify-between mb-4 px-2">
							<h3 class="font-bold flex items-center gap-2">Image Queue</h3>
							<div class="flex items-center gap-3">
								<div class="text-sm font-medium text-slate-500 dark:text-slate-400"><span id="summaryText">Empty</span></div>
								<button id="downloadAllBtn" class="inline-flex items-center justify-center rounded-full bg-slate-900 text-white px-5 py-2 text-sm font-bold active:bg-black dark:bg-slate-700 dark:active:bg-slate-600 disabled:opacity-40 transition shadow-md" disabled>Save All</button>
							</div>
						</div>
						<div id="previewList" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
					</div>
				</div>

				<!-- Material Card 2 -->
				<div class="bg-white rounded-[24px] p-5 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)] dark:bg-slate-800/80 border border-slate-100 dark:border-slate-700/50">
					<h2 class="text-lg font-bold mb-4 flex items-center gap-2"><span class="flex items-center justify-center w-6 h-6 rounded-full bg-indigo-100 text-indigo-700 text-xs dark:bg-indigo-900/50 dark:text-indigo-300">2</span> Resize Options</h2>
					<div class="grid grid-cols-2 gap-4">
						<div class="relative">
							<label class="block text-xs font-semibold text-slate-500 mb-1.5 dark:text-slate-400 uppercase tracking-wide">Width (px)</label>
							<input id="targetWidth" type="number" min="1" placeholder="e.g. 1280" class="w-full rounded-2xl border-0 bg-slate-100 px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 dark:bg-slate-900 dark:text-slate-100 transition">
						</div>
						<div class="relative">
							<label class="block text-xs font-semibold text-slate-500 mb-1.5 dark:text-slate-400 uppercase tracking-wide">Height (px)</label>
							<input id="targetHeight" type="number" min="1" placeholder="e.g. 720" class="w-full rounded-2xl border-0 bg-slate-100 px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 dark:bg-slate-900 dark:text-slate-100 transition">
						</div>
						<div class="col-span-2">
							<label class="block text-xs font-semibold text-slate-500 mb-1.5 dark:text-slate-400 uppercase tracking-wide">Presets</label>
							<select id="presetSize" class="w-full appearance-none rounded-2xl border-0 bg-slate-100 px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 dark:bg-slate-900 dark:text-slate-100 transition">
								<option value="">None</option>
								<option value="1920x1080">1920 x 1080 (Full HD)</option>
								<option value="1280x720">1280 x 720 (HD)</option>
								<option value="1080x1080">1080 x 1080 (Square)</option>
								<option value="800x600">800 x 600</option>
								<option value="600x600">600 x 600 (Square)</option>
								<option value="512x512">512 x 512 (Square)</option>
							</select>
						</div>
					</div>
					<div class="flex items-center gap-3 mt-4 bg-slate-50 dark:bg-slate-900/50 p-3 rounded-2xl">
						<input id="lockRatio" type="checkbox" class="w-5 h-5 rounded border-0 bg-white dark:bg-slate-800 text-indigo-600 focus:ring-indigo-500 dark:focus:ring-indigo-500">
						<label for="lockRatio" class="text-sm font-medium text-slate-700 dark:text-slate-200">Maintain aspect ratio</label>
					</div>
				</div>

				<!-- Material Card 3 -->
				<div class="bg-white rounded-[24px] p-5 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)] dark:bg-slate-800/80 border border-slate-100 dark:border-slate-700/50">
					<h2 class="text-lg font-bold mb-4 flex items-center gap-2"><span class="flex items-center justify-center w-6 h-6 rounded-full bg-indigo-100 text-indigo-700 text-xs dark:bg-indigo-900/50 dark:text-indigo-300">3</span> Output & Quality</h2>
					<div class="grid grid-cols-2 gap-4">
						<div>
							<label class="block text-xs font-semibold text-slate-500 mb-1.5 dark:text-slate-400 uppercase tracking-wide">Format</label>
							<select id="outputFormat" class="w-full appearance-none rounded-2xl border-0 bg-slate-100 px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 dark:bg-slate-900 dark:text-slate-100 transition">
								<option value="original">Original</option>
								<option value="image/jpeg">JPEG</option>
								<option value="image/png">PNG</option>
								<option value="image/webp">WEBP</option>
							</select>
						</div>
						<div>
							<label class="block text-xs font-semibold text-slate-500 mb-1.5 dark:text-slate-400 uppercase tracking-wide">Quality</label>
							<input id="quality" type="range" min="0.1" max="1" step="0.05" value="0.8" class="w-full mt-2 accent-indigo-600">
							<div class="flex justify-between text-[11px] font-medium text-slate-400 dark:text-slate-500 mt-1">
								<span>Smaller</span>
								<span>Better</span>
							</div>
						</div>
						<div class="col-span-2">
							<label class="block text-xs font-semibold text-slate-500 mb-1.5 dark:text-slate-400 uppercase tracking-wide">Target size (KB) — optional</label>
							<input id="targetSizeKB" type="number" min="1" placeholder="e.g. 300" class="w-full rounded-2xl border-0 bg-slate-100 px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 dark:bg-slate-900 dark:text-slate-100 transition">
						</div>
					</div>
					<div class="flex gap-3 mt-6">
						<button id="processBtn" class="flex-1 items-center justify-center rounded-full bg-indigo-600 text-white px-4 py-4 font-bold shadow-lg shadow-indigo-200 dark:shadow-none active:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition transform active:scale-[0.98]">
							Process Images
						</button>
						<button id="clearBtn" class="flex-1 items-center justify-center rounded-full bg-slate-100 text-slate-700 px-4 py-4 font-bold hover:bg-slate-200 active:bg-slate-300 transition dark:bg-slate-700/50 dark:text-slate-200 dark:active:bg-slate-600">
							Clear Queue
						</button>
					</div>
				</div>
			</div>
			
			<!-- Bottom padding specifier for mobile if there's no fixed footer -->
			<div class="h-10"></div>
		</section>
	</main>

	<footer class="text-center text-xs text-slate-500 py-6 dark:text-slate-400">All rights reserved</footer>

	<script src="./assets/js/app.js"></script>
</body>
</html>
